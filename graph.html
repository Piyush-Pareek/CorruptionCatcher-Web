<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorruptionCatcher | The Forensic Web</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: white; text-align: center; margin: 0; padding: 20px;}
        #mynetwork {
            width: 90%;
            height: 700px;
            border: 2px solid #ff4444;
            margin: 0 auto;
            background-color: #222;
            border-radius: 10px;
        }
        h1 { color: #ff4444; }
    </style>
</head>
<body>
    <a href="/index.html" style="color: white;">🔙 Back to Main Ledger</a>
    <h1>🚨 Live Forensic Transaction Web 🚨</h1>
    <p>Tracking the flow of public funds in real-time.</p>
    
    <div id="mynetwork"></div>

    <script>
       // 1. Fetch the raw JSON from your live Render API
        fetch('https://corruption-catcher-api.onrender.com/api/blockchain/graph')
            .then(response => response.json())
            .then(data => {
                
                // 2. Setup empty arrays for the Dots (Nodes) and Lines (Edges)
                const nodes = new vis.DataSet();
                const edges = new vis.DataSet();
                const addedNodes = new Set(); // Keeps track so we don't draw duplicates

                // 3. The Parser Logic (Translates Neo4j JSON to Vis.js Physics)
                function processEntity(entity) {
                    if (!entity || !entity.name) return; // Safety check

                    // If we haven't drawn this person/company yet, add them as a Node
                    if (!addedNodes.has(entity.name)) {
                        
                        // --- THE AI UPGRADE ---
                        // Check if Java flagged them as corrupt. If yes, make them RED and massive!
                        let isCorrupt = entity.isSuspicious === true; 
                        let dotColor = isCorrupt ? '#ff1100' : '#00ccff'; 
                        let dotSize = isCorrupt ? 40 : 20; 
                        
                        nodes.add({ id: entity.name, label: entity.name, shape: 'dot', size: dotSize, color: dotColor });
                        addedNodes.add(entity.name);
                    }
                    
                    // If they sent money to anyone, draw an arrow (Edge) to the recipient
                    if (entity.recipients && entity.recipients.length > 0) {
                        entity.recipients.forEach(recipient => {
                            processEntity(recipient); // Process the receiver
                            edges.add({ from: entity.name, to: recipient.name, arrows: 'to', color: '#ff4444' });
                        });
                    }
                }

                // 4. Run your data through the parser
                data.forEach(entity => processEntity(entity));

                // 5. Inject it into the HTML page with Physics turned on!
                const container = document.getElementById('mynetwork');
                const graphData = { nodes: nodes, edges: edges };
                const options = {
                    physics: {
                        stabilization: false,
                        barnesHut: { springLength: 200 }
                    }
                };
                
                new vis.Network(container, graphData, options);
            })
            .catch(error => console.error('Error fetching graph:', error));
    </script>
</body>
</html>
